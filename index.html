<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avipriya Endaw - Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: block;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      padding: 20px;
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    nav h1 {
      font-size: 1.5rem;
      background: linear-gradient(45deg, #39FF14, #6A0DAD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #e0e0e0;
      text-decoration: none;
      transition: 0.3s;
    }

    section {
      position: relative;
      background: transparent !important;
      z-index: 1;
      padding: 100px 20px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero h2 {
      font-size: 3.5rem;
      background: linear-gradient(45deg, #39FF14, #6A0DAD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .skill-card, .project-card {
      background: rgba(26, 26, 26, 0.4);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #333;
      text-align: left;
    }

    .project-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border: 1px solid #39FF14;
      color: #39FF14;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <header>
    <nav>
      <h1>Avipriya Endaw</h1>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="hero">
    <h2>Hi, I'm Avipriya Endaw</h2>
    <p>Software developer specializing in high-performance applications and clean, maintainable code[cite: 44, 46].</p>
  </section>

  <section id="skills">
    <div class="skills-grid">
      <div class="skill-card">
        <h3>Backend Development</h3>
        <p>Expertise in Java, Spring Boot, and PL/SQL[cite: 48].</p>
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];

    const mouse = { x: null, y: null, radius: 220 };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
    });

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        // Slow initial drift for "slowly moving structure"
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.size = Math.random() * 2 + 1;
        
        this.orbitAngle = Math.random() * Math.PI * 2;
        this.phi = Math.random() * Math.PI * 2;
        this.orbitSpeed = (Math.random() * 0.01) + 0.002;
        this.targetDistance = 130 + (Math.random() * 50);
      }

      update() {
        if (mouse.x !== null && mouse.y !== null) {
          let dxM = mouse.x - this.x;
          let dyM = mouse.y - this.y;
          let distM = Math.sqrt(dxM * dxM + dyM * dyM);

          if (distM < mouse.radius) {
            this.orbitAngle += this.orbitSpeed;
            this.phi += 0.01;

            const targetX = mouse.x + Math.cos(this.orbitAngle) * this.targetDistance * Math.sin(this.phi);
            const targetY = mouse.y + Math.sin(this.orbitAngle) * this.targetDistance * Math.sin(this.phi);

            // Very weak attraction to allow quick detachment
            this.vx += (targetX - this.x) * 0.01;
            this.vy += (targetY - this.y) * 0.01;
            this.z = Math.cos(this.phi);
          } else {
            this.z = 1;
            this.applyDrift();
          }
        } else {
          this.z = 1;
          this.applyDrift();
        }

        this.vx *= 0.94; // Friction
        this.vy *= 0.94;

        this.x += this.vx;
        this.y += this.vy;

        // Wrap boundaries
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }

      applyDrift() {
        // Adds subtle random movement when not influenced by mouse
        this.vx += (Math.random() - 0.5) * 0.02;
        this.vy += (Math.random() - 0.5) * 0.02;
      }

      draw() {
        const opacity = (this.z + 1) / 2;
        ctx.fillStyle = `rgba(57, 255, 20, ${opacity * 0.6})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (opacity + 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      particles = [];
      for (let i = 0; i < 140; i++) particles.push(new Particle());
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        const p1 = particles[i];

        // Only draw line to center if mouse is active and particle is close
        if (mouse.x !== null) {
          const dxM = p1.x - mouse.x;
          const dyM = p1.y - mouse.y;
          const distM = Math.sqrt(dxM * dxM + dyM * dyM);
          if (distM < 180) {
            ctx.strokeStyle = `rgba(57, 255, 20, ${0.1 * (1 - distM / 180)})`;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }

        // Randomly connect nearby dots to form structure
        for (let j = i + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 90) { // Connection threshold
            ctx.strokeStyle = `rgba(106, 13, 173, ${0.4 * (1 - dist / 90)})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = 'lighter';
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      drawLines();
      requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>
</body>
</html>
