<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avipriya Endaw - Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: block;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      padding: 20px;
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    nav h1 {
      font-size: 1.5rem;
      background: linear-gradient(45deg, #39FF14, #6A0DAD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #e0e0e0;
      text-decoration: none;
    }

    section {
      position: relative;
      background: transparent !important;
      z-index: 1;
      padding: 120px 20px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    .hero h2 {
      font-size: 3.5rem;
      background: linear-gradient(45deg, #39FF14, #6A0DAD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .skill-card, .project-card {
      background: rgba(26, 26, 26, 0.4);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #333;
      text-align: left;
      margin-top: 20px;
    }

    .project-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border: 1px solid #39FF14;
      color: #39FF14;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <header>
    <nav>
      <h1>Avipriya Endaw</h1>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="hero">
    <h2>Hi, I'm Avipriya Endaw</h2>
    <p>Software developer specializing in high-performance applications and clean, maintainable code[cite: 44, 46].</p>
  </section>

  <section id="skills">
    <div class="skill-card">
      <h3>Backend & Systems</h3>
      <p>Experience in Java, Spring Boot, C++, and Oracle PL/SQL[cite: 48, 49].</p>
    </div>
  </section>

  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];

    const mouse = { x: null, y: null, radius: 200 };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
    });

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      init(); 
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.6; // Very slow drift
        this.vy = (Math.random() - 0.5) * 0.6;
        this.size = Math.random() * 1.5 + 1;
        
        this.orbitAngle = Math.random() * Math.PI * 2;
        this.phi = Math.random() * Math.PI * 2;
        this.orbitSpeed = 0.005 + Math.random() * 0.01;
        this.targetDist = 120 + Math.random() * 40;
      }

      update() {
        if (mouse.x !== null && mouse.y !== null) {
          let dxM = mouse.x - this.x;
          let dyM = mouse.y - this.y;
          let distM = Math.sqrt(dxM * dxM + dyM * dyM);

          // Only attract nearby particles
          if (distM < mouse.radius) {
            this.orbitAngle += this.orbitSpeed;
            this.phi += 0.01;

            const tx = mouse.x + Math.cos(this.orbitAngle) * this.targetDist * Math.sin(this.phi);
            const ty = mouse.y + Math.sin(this.orbitAngle) * this.targetDist * Math.sin(this.phi);

            // Weak magnetic pull allows for easy detachment
            this.vx += (tx - this.x) * 0.008;
            this.vy += (ty - this.y) * 0.008;
          }
        }

        this.vx *= 0.95; // Friction to keep it smooth
        this.vy *= 0.95;
        this.x += this.vx;
        this.y += this.vy;

        // Screen wrap
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }

      draw() {
        ctx.fillStyle = 'rgba(57, 255, 20, 0.8)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      particles = [];
      for (let i = 0; i < 120; i++) particles.push(new Particle());
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          // Connection threshold for the "slowly moving structure"
          if (distance < 150) {
            const opacity = 1 - (distance / 150);
            ctx.strokeStyle = `rgba(106, 13, 173, ${opacity * 0.5})`; // Purple web
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }

        // Optional center line to mouse if active
        if (mouse.x !== null) {
          const dxM = particles[i].x - mouse.x;
          const dyM = particles[i].y - mouse.y;
          const distM = Math.sqrt(dxM * dxM + dyM * dyM);
          if (distM < 180) {
            ctx.strokeStyle = `rgba(57, 255, 20, ${0.1 * (1 - distM / 180)})`;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = 'lighter';
      for (let p of particles) {
        p.update();
        p.draw();
      }
      drawLines();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
